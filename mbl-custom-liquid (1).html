/* ── GLOSSARY ── */
const GLOSSARY=[
{term:"Humectant",def:"An ingredient that draws water molecules from the air and deeper skin layers into the epidermis. Examples: Hyaluronic Acid, Glycerin, Panthenol."},
{term:"Emollient",def:"An ingredient that softens and smooths the skin by filling the spaces between skin cells. Examples: Squalane, Jojoba Oil, Ceramides."},
{term:"Occlusive",def:"An ingredient that forms a physical barrier on the skin surface to seal in moisture and prevent transepidermal water loss. Examples: Shea Butter, Petrolatum."},
{term:"TEWL",def:"Transepidermal Water Loss — the passive evaporation of water through the skin's barrier. Increased TEWL indicates a compromised barrier."},
{term:"Tyrosinase",def:"The enzyme responsible for catalyzing melanin production. Many brightening ingredients work by inhibiting tyrosinase."},
{term:"NMF",def:"Natural Moisturising Factor — hygroscopic molecules (amino acids, urea, lactic acid) naturally found in the skin that retain moisture."},
{term:"AHA",def:"Alpha Hydroxy Acid — water-soluble acids (Glycolic, Lactic, Mandelic) that exfoliate the skin's surface by dissolving the bonds between dead skin cells."},
{term:"BHA",def:"Beta Hydroxy Acid — oil-soluble acid (Salicylic Acid) that penetrates inside pores to dissolve sebum and dead cells."},
{term:"PHA",def:"Polyhydroxy Acid — next-generation exfoliants (Gluconolactone, Lactobionic Acid) with larger molecules that exfoliate extremely gently."},
{term:"Retinoid",def:"A family of Vitamin A derivatives including Retinyl Palmitate, Retinol, Retinal, and prescription Tretinoin — all accelerate cell turnover."},
{term:"PIH",def:"Post-Inflammatory Hyperpigmentation — dark spots that appear after skin trauma such as acne, eczema, or irritation."},
{term:"Ceramides",def:"Lipid molecules comprising approximately 50% of the skin's stratum corneum. Essential for barrier integrity and preventing moisture loss."},
{term:"Peptides",def:"Short chains of amino acids that signal the skin to produce collagen, elastin, and other structural proteins."},
{term:"pH",def:"A measure of acidity or alkalinity. Healthy skin has a pH of approximately 4.5–5.5. Many actives require low pH to function effectively."},
{term:"Sebum",def:"The natural oil produced by sebaceous glands. Overproduction leads to oily skin and acne; underproduction leads to dry, tight skin."},
{term:"Free Radicals",def:"Unstable molecules from UV, pollution, and metabolism that damage skin cells. Antioxidants neutralize them."},
{term:"Comedogenic",def:"Referring to an ingredient's potential to clog pores and contribute to blackheads and acne. Comedogenic ratings range from 0 (safe) to 5."},
{term:"Melanin",def:"The pigment responsible for skin, hair, and eye color. Localized overproduction causes hyperpigmentation and dark spots."},
{term:"Microbiome",def:"The diverse community of microorganisms living on the skin's surface. A balanced microbiome is essential for skin health and immunity."},
{term:"Collagen",def:"The most abundant structural protein in the dermis, providing skin its firmness and elasticity. Declines with age and UV exposure."},
{term:"Biome",def:"Short for microbiome — the skin's ecosystem of beneficial bacteria. Probiotic skincare ingredients support and protect this ecosystem."}
];

<div v-if="mode==='compare'">

            <div class="cmp-title" v-text="ing"></div>
            <div class="cmp-ben" v-text="ingredientsData[ing].ben"></div>
            <div class="cmp-row"><span>Category</span><strong v-text="ingredientsData[ing].cat"></strong></div>

          </div>

    </div>

</div>

<!-- ─── GLOSSARY ─── -->
<div v-if="mode==='glossary'">
  <div style="max-width:840px;margin:0 auto;width:100%">

<p class="footer-note">MBL Artistry Studio & Spa · Belinic Skin Intelligence · <a :href="'https://www.mblartistry.com'" target="_blank" style="color:var(--gold);text-decoration:none">mblartistry.com</a></p>

<!-- Compare Tray -->
<div class="compare-tray" v-if="compareList.length>0 && mode!=='compare'">
  <span style="font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-family:Montserrat,sans-serif;white-space:nowrap">{{compareList.length}}/4 Selected</span>
  <div v-for="ing in compareList" :key="ing" class="cmp-chip">
    <span v-text="ingredientsData[ing].emoji"></span>
    <span v-text="ing.length>18?ing.slice(0,18)+'…':ing" style="font-size:10.5px"></span>

function initMblApp(){
  const mountPoint=document.getElementById('mbl-quiz-root-wrapper');
  if(!mountPoint) return;
  mountPoint.innerHTML='<div id="mbl-quiz-root"></div>';

  Vue.createApp({
    template:htmlTemplate,
    data(){
      return{
        mode:'home',previousMode:'home',
        quizStep:0,answers:{},results:[],
        searchIngredient:'',activeCategory:'All',
        selectedIngredient:null,
        emailCapture:'',emailSubmitted:false,
        compareList:[],compareSearch:'',
        routineTab:'AM',
        glossSearch:'',
        ingredientsData:INGREDIENTS,
        allProducts:PRODUCTS,
        questions:QUESTIONS,
        allCategories:ALL_CATEGORIES,
        glossary:GLOSSARY,
        layeringRules:LAYERING_RULES,
        isWide:window.innerWidth>=1024
      }
    },
    computed:{
      currentQuestion(){return this.questions[this.quizStep];},
      filteredIngredients(){
        return Object.keys(this.ingredientsData).filter(i=>{
          const matchSearch=i.toLowerCase().includes(this.searchIngredient.toLowerCase())||this.ingredientsData[i].ben.toLowerCase().includes(this.searchIngredient.toLowerCase());
          const matchCat=this.activeCategory==='All'||this.ingredientsData[i].cat===this.activeCategory;
          return matchSearch&&matchCat;
        });
      },
      compareFiltered(){
        const q=this.compareSearch.toLowerCase();
        return Object.keys(this.ingredientsData).filter(i=>i.toLowerCase().includes(q)||this.ingredientsData[i].ben.toLowerCase().includes(q));
      },
      routineSteps(){
        if(this.routineTab==='AM') return ROUTINE.AM;
        if(this.routineTab==='PM') return ROUTINE.PM;
        return[];
      },
      filteredGlossary(){
        const q=this.glossSearch.toLowerCase();
        return this.glossary.filter(g=>g.term.toLowerCase().includes(q)||g.def.toLowerCase().includes(q));
      },
      recommendedProducts(){
        const scored={};
        const{skinType,concern1,concern2}=this.answers;
        Object.entries(this.allProducts).forEach(([name,p])=>{
          let score=0;
          if(p.bestFor.includes(skinType)) score+=2;
          if(p.concerns.includes(concern1)) score+=3;
          if(concern2&&p.concerns.includes(concern2)) score+=1;
          scored[name]={...p,matchScore:Math.min(5,score)};
        });
        const sorted=Object.entries(scored).sort((a,b)=>b[1].matchScore-a[1].matchScore);
        const top=sorted.slice(0,4);
        return Object.fromEntries(top);
      }
    },
    methods:{
      go(m){
        this.mode=m;
        const mp=document.getElementById('mbl-quiz-root-wrapper');
        if(mp){
          const stickyOffset=(document.querySelector('.shopify-section--header')||document.querySelector('sticky-header')||document.querySelector('[data-sticky-header]')||{offsetHeight:0}).offsetHeight||0;
          window.scrollTo({top:mp.getBoundingClientRect().top+window.pageYOffset-(stickyOffset+60),behavior:'smooth'});
        }
      },
      handleAnswer(qId,ans){
        this.answers[qId]=ans;
        if(this.quizStep<this.questions.length-1){this.quizStep++;}
        else{this.generateRecommendations();this.go('email');}
      },
      backQuiz(){
        if(this.quizStep===0) this.go('home');
        else this.quizStep--;
      },
      submitEmail(){
        this.emailSubmitted=true;
        setTimeout(()=>this.go('results'),1300);
      },
      generateRecommendations(){
        const recs=["Hyaluronic Acid","Ceramides"];
        const{skinType,concern1,concern2,experience}=this.answers;
        if(concern1==="Acne & breakouts"||skinType==="Oily"){recs.push("BHA – Salicylic Acid","Niacinamide");}
        if(concern1==="Fine lines & aging"){recs.push("Peptides");if(experience!=="Complete beginner") recs.push("Vitamin A – Retinol");else recs.push("Bakuchiol");}
        if(concern1==="Dark spots & dullness"){recs.push("Vitamin C(L-Ascorbic Acid)","Alpha-Arbutin");}
        if(concern1==="Large pores"){recs.push("Niacinamide","BHA – Salicylic Acid");}
        if(concern1==="Redness & sensitivity"||skinType==="Sensitive"){recs.push("Azelaic Acid","Centella Asiatica(Cica)");}
        if(concern2==="Uneven texture") recs.push("AHA – Glycolic Acid");
        if(concern2==="Dehydration") recs.push("Sodium Hyaluronate");
        if(concern2==="Excess oiliness") recs.push("Zinc PCA");
        if(skinType==="Dry") recs.push("Panthenol(Vitamin B5)");
        this.results=[...new Set(recs)].slice(0,6);
      },
      getProductIndex(name){
        const idx=Object.keys(this.allProducts).indexOf(name)+1;
        return idx<10?'0'+idx:idx;
      },
      viewDetail(ingredient,origin){
        this.selectedIngredient=ingredient;
        this.previousMode=origin;
        this.go('detail');
      },
      toggleCompare(ing){
        const idx=this.compareList.indexOf(ing);
        if(idx>-1){this.compareList.splice(idx,1);}
        else if(this.compareList.length<4){this.compareList.push(ing);}
      },
      productsWithIngredient(ing){
        return Object.entries(this.allProducts)
          .filter(([n,p])=>p.keyIngredients.some(i=>i.toLowerCase().includes(ing.toLowerCase().split('(')[0].trim())))
          .map(([n])=>n);
      },
      getInsight(ing){
        const d=this.ingredientsData[ing];
        const avoidNote=d.aw.length>0?` Avoid pairing with ${d.aw[0]} in the same routine.`:'';
        const timeNote=d.rt==='AM'?'morning ritual':(d.rt==='PM'?'evening ritual':'both AM and PM rituals');
        return `${ing} is best introduced into your ${timeNote}.${avoidNote} As with all active formulas, introduce gradually and observe for 2–4 weeks before layering with additional actives. Our estheticians at MBL Artistry are always available to guide your personal belinic skin journey.`;
      },
      resetApp(){
        this.mode='home';this.quizStep=0;this.answers={};this.results=[];
        this.emailCapture='';this.emailSubmitted=false;this.selectedIngredient=null;
      }
    }
  }).mount('#mbl-quiz-root');
}

if(document.readyState==='complete'||document.readyState==='interactive'){
  setTimeout(initMblApp,50);
}else{
  document.addEventListener('DOMContentLoaded',initMblApp);
}
})();
</script>
