filteredGlossary(){
const q=this.glossSearch.toLowerCase();
return this.glossary.filter(g=>g.term.toLowerCase().includes(q)||g.def.toLowerCase().includes(q));
}
},
methods:{
go(m){
this.mode=m;
const mp=document.getElementById('mbl-quiz-root-wrapper');
if(mp){var stickyOffset=(document.querySelector('.shopify-section--header') || document.querySelector('sticky-header') || document.querySelector('[data-sticky-header]') ||{offsetHeight:0}).offsetHeight || 0;window.scrollTo({top:mp.getBoundingClientRect().top+window.pageYOffset-(stickyOffset+60),behavior:'smooth'});}
},
handleAnswer(qId,ans){
this.answers[qId]=ans;
if(this.quizStep<this.questions.length-1){this.quizStep++;}
else{this.generateRecommendations();this.go('email');}
},
backQuiz(){
if(this.quizStep===0) this.go('home');
else this.quizStep--;
},
submitEmail(){
this.emailSubmitted=true;
setTimeout(()=>this.go('results'),1200);
},
generateRecommendations(){
const recs=["Hyaluronic Acid","Ceramides"];
const{skinType,concern1,concern2,experience}=this.answers;
if(concern1==="Acne & breakouts"||skinType==="Oily"){recs.push("BHA – Salicylic Acid","Niacinamide");}
if(concern1==="Fine lines & aging"){recs.push("Peptides");if(experience!=="Complete beginner") recs.push("Vitamin A – Retinol");else recs.push("Bakuchiol");}
if(concern1==="Dark spots & dullness"){recs.push("Vitamin C(L-Ascorbic Acid)","Alpha-Arbutin");}
if(concern1==="Large pores"){recs.push("Niacinamide","BHA – Salicylic Acid");}
if(concern1==="Redness & sensitivity"||skinType==="Sensitive"){recs.push("Azelaic Acid","Centella Asiatica(Cica)");}
if(concern2==="Uneven texture") recs.push("AHA – Glycolic Acid");
if(concern2==="Dehydration") recs.push("Sodium Hyaluronate");
if(concern2==="Excess oiliness") recs.push("Zinc PCA");
if(skinType==="Dry") recs.push("Panthenol(Vitamin B5)");
this.results=[...new Set(recs)].slice(0,6);
},
viewDetail(ingredient,origin){
this.selectedIngredient=ingredient;
this.previousMode=origin;
this.go('detail');
},
toggleCompare(ing){
const idx=this.compareList.indexOf(ing);
if(idx>-1){this.compareList.splice(idx,1);}
else if(this.compareList.length<4){this.compareList.push(ing);}
},
getInsight(ing){
const d=this.ingredientsData[ing];
const avoidNote=d.aw.length>0?` Avoid pairing with ${d.aw[0]} in the same routine.`:'';
return `${ing} is best introduced ${d.rt==='AM'?'into your morning ritual':(d.rt==='PM'?'into your evening ritual':'into both AM and PM rituals')}, applied at the ${"—"} step. ${avoidNote} As with all active formulas, introduce gradually and observe for 2–4 weeks before combining with additional actives. Our estheticians at MBL Artistry are always available to guide your personal skin journey.`;
},
resetApp(){
this.mode='home';this.quizStep=0;this.answers={};this.results=[];
this.emailCapture='';this.emailSubmitted=false;this.selectedIngredient=null;
}
}
}).mount('#mbl-quiz-root');
}
if(document.readyState==='complete'||document.readyState==='interactive'){
setTimeout(initMblApp,50);
}else{
document.addEventListener('DOMContentLoaded',initMblApp);
}
})();
</script>
