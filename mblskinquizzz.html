`;

function initBelinicApp(){
  const mountPoint=document.getElementById('belinic-root-wrapper');
  if(!mountPoint) return;
  mountPoint.innerHTML='<div id="belinic-root"></div>';

  Vue.createApp({
    template:htmlTemplate,
    data(){
      return{
        mode:'home',previousMode:'home',
        quizStep:0,answers:{},results:[],
        searchIngredient:'',activeCategory:'All',
        selectedIngredient:null,
        emailCapture:'',emailSubmitted:false,
        routineTab:'AM',
        ingredientsData:INGREDIENTS,
        allProducts:PRODUCTS,
        questions:QUESTIONS,
        allCategories:ALL_CATEGORIES
      }
    },
    computed:{
      currentQuestion(){return this.questions[this.quizStep]},
      filteredIngredients(){
        return Object.keys(this.ingredientsData).filter(i=>{
          const matchSearch=i.toLowerCase().includes(this.searchIngredient.toLowerCase())||
            this.ingredientsData[i].ben.toLowerCase().includes(this.searchIngredient.toLowerCase());
          const matchCat=this.activeCategory==='All'||this.ingredientsData[i].cat===this.activeCategory;
          return matchSearch&&matchCat;
        });
      },
      routineSteps(){
        return this.routineTab==='AM'?ROUTINE.AM:ROUTINE.PM;
      },
      recommendedProducts(){
        const scored={};
        const{skinType,concern1,concern2}=this.answers;
        const isAcneOily=skinType==='Oily'||concern1==='Acne & breakouts'||concern2==='Acne & breakouts';
        Object.entries(this.allProducts).forEach(([name,p])=>{
          if(name==='LumiExo Cream'&&isAcneOily) return;
          let score=0;
          if(p.bestFor.includes(skinType)) score+=2;
          if(p.concerns.includes(concern1)) score+=3;
          if(concern2&&concern2!=='None'&&p.concerns.includes(concern2)) score+=1;
          scored[name]={...p,matchScore:Math.min(5,score)};
        });
        const sorted=Object.entries(scored).sort((a,b)=>b[1].matchScore-a[1].matchScore);
        return Object.fromEntries(sorted.slice(0,4));
      },
      isAcneOilySkin(){
        const{skinType,concern1,concern2}=this.answers;
        return skinType==='Oily'||concern1==='Acne & breakouts'||concern2==='Acne & breakouts';
      }
    },
    methods:{
      go(m){
        this.mode=m;
        const mp=document.getElementById('belinic-root-wrapper');
        if(mp){
          const stickyOffset=(document.querySelector('.shopify-section--header')||document.querySelector('sticky-header')||{offsetHeight:0}).offsetHeight||0;
          window.scrollTo({top:mp.getBoundingClientRect().top+window.pageYOffset-(stickyOffset+60),behavior:'smooth'});
        }
      },
      handleAnswer(qId,ans){
        this.answers[qId]=ans;
        if(this.quizStep<this.questions.length-1){this.quizStep++;}
        else{this.generateRecommendations();this.go('email');}
      },
      skipToResults(){
        if(!this.results||this.results.length===0) this.generateRecommendations();
        this.go('results');
      },
      backQuiz(){
        if(this.quizStep===0) this.go('home');
        else this.quizStep--;
      },
      submitEmail(){
        this.emailSubmitted=true;
        if(!this.results||this.results.length===0) this.generateRecommendations();
        setTimeout(()=>this.go('results'),1400);
      },
      generateRecommendations(){
        const recs=["Phytotherasome Grape Exosomes","Hyaluronic Acid (8 Types)"];
        const{skinType,concern1,concern2}=this.answers;
        if(concern1==="Dullness & uneven tone"||concern1==="Fine lines & aging"){
          recs.push("Glutathione","Gluconolactone (PHA)");
        }
        if(concern1==="Acne & breakouts"||skinType==="Oily"){
          recs.push("Niacinamide");
        }
        if(concern1==="Redness & sensitivity"||skinType==="Sensitive"){
          recs.push("Allantoin","Alaskan Glacial Water");
        }
        if(concern2==="Post-treatment care"||concern2==="Dehydration"){
          recs.push("Allantoin","Bio-Detox Complex");
        }
        if(concern2==="Uneven texture"){
          recs.push("Gluconolactone (PHA)","Thymus Serpyllum Extract");
        }
        if(skinType==="Sensitive"||skinType==="Dry"){
          recs.push("Allantoin");
        }
        recs.push("Probiotic Complex (10 Strains)");
        const filtered=[...new Set(recs)].filter(r=>this.ingredientsData[r]);
        // Fallback: always show at least the core two ingredients
        this.results=filtered.length>0?filtered.slice(0,6):["Phytotherasome Grape Exosomes","Glutathione","Niacinamide"];
      },
      getProductIndex(name){
        const idx=Object.keys(this.allProducts).indexOf(name)+1;
        return idx<10?'0'+idx:String(idx);
      },
      viewDetail(ingredient,origin){
        this.selectedIngredient=ingredient;
        this.previousMode=origin;
        this.go('detail');
      },
      productsWithIngredient(ing){
        const ingLower=ing.toLowerCase().split('(')[0].trim().split(' ').filter(w=>w.length>3);
        return Object.entries(this.allProducts)
          .filter(([n,p])=>p.keyIngredients.some(ki=>{
            const kiLower=ki.toLowerCase();
            return ingLower.some(word=>kiLower.includes(word));
          }))
          .map(([n])=>n);
      },
      getInsight(ing){
        const d=this.ingredientsData[ing];
        const timeNote=d.rt==='AM'?'morning ritual':(d.rt==='PM'?'evening ritual':'both AM and PM rituals');
        const pairNote=d.pairings&&d.pairings.length>0?` It works beautifully alongside ${d.pairings[0]} for enhanced results.`:'';
        return `${ing} is best introduced into your ${timeNote}.${pairNote} As with all advanced formulas, allow 6–8 weeks of consistent use before evaluating results. Our estheticians at MBL Artistry are always available to guide your personal Belinic skin journey — book a consultation at mblartistry.com.`;
      },
      resetApp(){
        this.mode='home';this.quizStep=0;this.answers={};this.results=[];
        this.emailCapture='';this.emailSubmitted=false;this.selectedIngredient=null;
      }
    }
  }).mount('#belinic-root');
}

if(document.readyState==='complete'||document.readyState==='interactive'){
  setTimeout(initBelinicApp,50);
}else{
  document.addEventListener('DOMContentLoaded',initBelinicApp);
}
})();
</script>
